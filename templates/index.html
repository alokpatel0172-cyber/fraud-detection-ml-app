<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fraud Detection App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; }
    .card { border-radius: 16px; border: none; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
    .card-header { background: linear-gradient(90deg, #e74c3c, #c0392b); border-radius: 16px 16px 0 0 !important; }
    .btn-predict { background: linear-gradient(90deg, #e74c3c, #c0392b); border: none; font-size: 1.1rem; padding: 12px; }
    .form-label { font-weight: 600; color: #495057; }
  </style>
</head>
<body class="py-4">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="card">
          <div class="card-header text-white text-center py-3">
            <h3 class="mb-0">🔍 Credit Card Fraud Detection</h3>
            <small>Enter transaction details below</small>
          </div>
          <div class="card-body p-4">
            <form action="/predict" method="POST">

              <div class="row mb-3">
                <div class="col-md-6">
                  <label class="form-label">Transaction Amount (₹)</label>
                  <input type="number" name="amount" class="form-control" placeholder="e.g. 5000" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Transaction Frequency (per day)</label>
                  <input type="number" name="frequency" class="form-control" placeholder="e.g. 3" required>
                </div>
              </div>

              <div class="row mb-3">
                <div class="col-md-6">
                  <label class="form-label">Average Transaction Amount (₹)</label>
                  <input type="number" name="avg_amount" class="form-control" placeholder="e.g. 2000" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Transaction Type</label>
                  <select name="transaction_type" class="form-select">
                    <option>Online</option>
                    <option>POS</option>
                    <option>ATM</option>
                  </select>
                </div>
              </div>

              <div class="row mb-3">
                <div class="col-md-6">
                  <label class="form-label">Payment Gateway</label>
                  <select name="payment_gateway" class="form-select">
                    <option>PayPal</option>
                    <option>Stripe</option>
                    <option>Square</option>
                    <option>Other</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Device OS</label>
                  <select name="device_os" class="form-select">
                    <option>Android</option>
                    <option>iOS</option>
                    <option>Windows</option>
                    <option>Other</option>
                  </select>
                </div>
              </div>

              <div class="row mb-3">
                <div class="col-md-6">
                  <label class="form-label">City</label>
                  <select name="city" class="form-select">
                    <option>Mumbai</option>
                    <option>Delhi</option>
                    <option>Bangalore</option>
                    <option>Chennai</option>
                    <option>Other</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label class="form-label">State</label>
                  <select name="state" class="form-select">
                    <option>MH</option>
                    <option>DL</option>
                    <option>KA</option>
                    <option>TN</option>
                    <option>Other</option>
                  </select>
                </div>
              </div>

              <div class="row mb-3">
                <div class="col-md-6">
                  <label class="form-label">Transaction Status</label>
                  <select name="status" class="form-select">
                    <option>Approved</option>
                    <option>Declined</option>
                    <option>Pending</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Merchant Category</label>
                  <select name="merchant_category" class="form-select">
                    <option>Retail</option>
                    <option>Food</option>
                    <option>Travel</option>
                    <option>Electronics</option>
                    <option>Other</option>
                  </select>
                </div>
              </div>

              <div class="mb-4">
                <label class="form-label">Transaction Channel</label>
                <select name="channel" class="form-select">
                  <option>Web</option>
                  <option>Mobile</option>
                  <option>In-store</option>
                </select>
              </div>

              <button type="submit" class="btn btn-predict text-white w-100 rounded-pill">
                🔍 Detect Fraud
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
